<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mangonmbofreli - Produits Naturels</title>

  <meta name="description" content="Produits naturels et solutions modernes au Cameroun.">
  <meta name="keywords" content="plantes médicinales, Cameroun, naturel">
  <meta name="author" content="Mangonmbofreli">

  <link rel="icon" href="favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<button class="dark-toggle" id="darkToggle">
  <i class="fas fa-moon"></i>
</button>

<header id="home">
  <h1>Mangonmbofreli</h1>
  <p>Solutions naturelles & produits modernes</p>
  <a href="#contact" class="btn">Nous contacter</a>
</header>

<nav>
  <a href="#home">Accueil</a>
  <a href="#services">Services</a>
  <a href="#gallery">Produits</a>
  <a href="#contact">Contact</a>
</nav>

<main>

<section class="container" id="services">
  <h2>Nos Services</h2>
  <div class="services">

    <div class="card">
      <i class="fas fa-leaf"></i>
      <h3>Naturel</h3>
      <p>Plantes médicinales authentiques</p>
    </div>

    <div class="card">
      <i class="fas fa-shopping-cart"></i>
      <h3>Produits</h3>
      <p>Qualité certifiée</p>
    </div>

    <div class="card">
      <i class="fas fa-user-md"></i>
      <h3>Conseils</h3>
      <p>Support personnalisé</p>
    </div>

  </div>
</section>

<section class="container" id="gallery">
  <h2>Nos Produits</h2>
  <div class="gallery">
    <img 
src="https://res.cloudinary.com/dcdnfxael/image/upload/f_auto,q_auto,w_400/produit.Feuilles dz NEEM"
srcset="
https://res.cloudinary.com/dcdnfxael/image/upload/w_300/produit.jpg 300w,
https://res.cloudinary.com/dcdnfxael/image/upload/w_600/produit.jpg 600w
"
sizes="(max-width:600px) 300px, 600px"
loading="lazy"
alt="Produit naturel">
  </div>
</section>

<section class="container" id="contact">
  <h2>Contact</h2>

  <form action="https://formspree.io/f/mlgaebby" method="POST">
    <input type="text" name="nom" placeholder="Nom" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message" required></textarea>
    <input type="text" name="_gotcha" style="display:none">
    <button type="submit" class="btn">Envoyer</button>
  </form>
</section>

<section class="container">
  <h2>Paiement</h2>
  <button id="payBtn" class="btn">Payer</button>
</section>

</main>

<footer>
  <p>© 2026 Mangonmbofreli</p>
</footer>

<a href="https://wa.me/237671615821" class="whatsapp">
  <i class="fab fa-whatsapp"></i>
</a>

<script src="script.js"></script>
</body>
</html>
